<form #myForm="ngForm" (ngSubmit)="register(myForm.value)">
  <input type="text" placeholder="First Name" name="firstName" ngModel />
  <input type="text" placeholder="Last Name" name="lastName" ngModel />
  <input [(ngModel)]="email" type="email" placeholder="Email" name="email" />
  <input type="password" placeholder="Password" name="password" ngModel />

  <button [disabled]="myForm.invalid">Register</button>
</form>

@if (showVerifyinput) {
  <div class="verify-box">
    <input
      type="text"
      placeholder="Enter Code"
      [(ngModel)]="code"
    />
    <button (click)="verify()">Verify</button>
  </div>
}
